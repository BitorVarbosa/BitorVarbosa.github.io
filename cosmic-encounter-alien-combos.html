<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Encounter — Alien Combos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface-2: #1e1e28;
    --border: #2a2a38;
    --text: #e2e2ea;
    --text-dim: #8888a0;
    --p3: #63b3ed;
    --p4: #68d391;
    --p5: #f6ad55;
    --p6: #fc8181;
    --p7: #b794f4;
    --p8: #4fd1c5;
    --diff-green:  #68d391;
    --diff-yellow: #f6ad55;
    --diff-red:    #fc8181;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.5;
    padding: 2rem 1.5rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  @keyframes backLinkColorCycle {
    0%, 100% { color: #ff79c6; text-shadow: 0 0 8px #ff79c6aa, 0 0 18px #ff79c655; }
    25%      { color: #8be9fd; text-shadow: 0 0 8px #8be9fdaa, 0 0 18px #8be9fd55; }
    50%      { color: #bd93f9; text-shadow: 0 0 8px #bd93f9aa, 0 0 18px #bd93f955; }
    75%      { color: #ff79c6; text-shadow: 0 0 8px #ff79c6aa, 0 0 18px #ff79c655; }
  }

  .back-link {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    text-decoration: none;
    margin-bottom: 1rem;
    animation: backLinkColorCycle 4s ease-in-out infinite;
  }
  .back-link:hover { text-decoration: underline; }

  header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.35rem;
  }
  header p { color: var(--text-dim); font-size: 0.9rem; }

  .legend {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1.3rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
  }
  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
  }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .legend .sep { background: transparent; border: none; padding: 0.25rem 0; color: var(--border); }

  .toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.8rem;
    padding: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .toggles-label {
    width: 100%;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.2rem;
  }
  .toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 0.4rem 0.75rem;
    border-radius: 999px;
    border: 1px solid var(--p4);
    background: #68d39122;
    color: var(--p4);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .toggle::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--p4);
    box-shadow: 0 0 6px var(--p4);
  }
  .toggle.off {
    border-color: #4a4a5a;
    background: transparent;
    color: var(--text-dim);
    text-decoration: line-through;
  }
  .toggle.off::before {
    background: #4a4a5a;
    box-shadow: none;
  }
  .toggle:hover { filter: brightness(1.15); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 1.2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    padding: 0.85rem 0.6rem;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.3px;
  }

  .card-body {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 4px;
    padding: 8px;
  }

  .plabel {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 0;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .alien {
    position: relative;
    padding: 6px 44px 6px 10px;
    border-radius: 4px;
    border-left: 3px solid;
    background: var(--surface-2);
    min-height: 52px;
  }
  .alien-name {
    font-weight: 700;
    font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2px;
  }
  .alien-desc {
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.35;
    margin-top: 1px;
  }
  .alien.missing .alien-name { color: var(--text-dim); font-style: italic; }

  .alien.missing-set {
    background: #fc818130;
    border-left-color: #fc8181 !important;
    box-shadow: inset 0 0 0 1px #fc818160;
  }
  .alien.missing-set .alien-desc { color: #f5c6c6; }
  .alien.missing-set .set-tag {
    background: #fc818125;
    border-color: #fc818170;
    color: #fc8181;
  }

  .meta {
    position: absolute;
    top: 7px;
    right: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .set-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.54rem;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 1px 4px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    line-height: 1.2;
    white-space: nowrap;
  }

  .diff {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    box-shadow: 0 0 0 2px var(--surface-2);
  }
  .diff-green  { background: var(--diff-green);  }
  .diff-yellow { background: var(--diff-yellow); }
  .diff-red    { background: var(--diff-red);    }

  .p3 { border-left-color: var(--p3); } .plabel.p3 { color: var(--p3); background: #63b3ed15; }
  .p4 { border-left-color: var(--p4); } .plabel.p4 { color: var(--p4); background: #68d39115; }
  .p5 { border-left-color: var(--p5); } .plabel.p5 { color: var(--p5); background: #f6ad5515; }
  .p6 { border-left-color: var(--p6); } .plabel.p6 { color: var(--p6); background: #fc818115; }
  .p7 { border-left-color: var(--p7); } .plabel.p7 { color: var(--p7); background: #b794f415; }
  .p8 { border-left-color: var(--p8); } .plabel.p8 { color: var(--p8); background: #4fd1c515; }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.75rem;
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    body { padding: 1.2rem 1rem; }
    header h1 { font-size: 1.4rem; }
    .grid { grid-template-columns: 1fr; gap: 1rem; }
  }
</style>
</head>

// Normalize: lowercase, strip non-alphanumerics
const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');

// Typos / variants in the combo file → canonical CSV names
const aliases = {
  crustal:    'crystal',
  firedanger: 'firedancer',
  lose:       'loser',
  packrate:   'packrat'
};

// Build alien lookup
const lookup = {};
for (const line of aliensRaw.split('\n')) {
  const [name, desc, diff, set] = line.split('|');
  const key = norm(name);
  if (!lookup[key]) lookup[key] = { name, desc, diff, set };
}

function findAlien(name) {
  const key = norm(name);
  if (lookup[key]) return lookup[key];
  if (aliases[key] && lookup[aliases[key]]) return lookup[aliases[key]];
  return { name, desc: 'No description found', diff: '', set: '', missing: true };
}

// Extract the short code in parens: "2014 (CD)" → "CD"
const setCode = s => {
  if (!s) return '';
  const m = s.match(/\(([^)]+)\)/);
  return m ? m[1] : s;
};

const diffClass = d =>
  d === 'Green'  ? 'diff-green'  :
  d === 'Yellow' ? 'diff-yellow' :
  d === 'Red'    ? 'diff-red'    : '';

// Parse combos
const combos = combosRaw.split('\n').map(line => {
  const idx = line.indexOf(':');
  const title = line.slice(0, idx).trim();
  const aliens = line.slice(idx + 1).split(',').map(s => s.trim());
  return { title, aliens };
});

// Render
const grid = document.getElementById('grid');

for (const { title, aliens } of combos) {
  const card = document.createElement('div');
  card.className = 'card';

  const h = document.createElement('div');
  h.className = 'card-title';
  h.textContent = title;
  card.appendChild(h);

  const body = document.createElement('div');
  body.className = 'card-body';

  // 3 Players label spans the first three rows (column 1)
  const lab3 = document.createElement('div');
  lab3.className = 'plabel p3';
  lab3.style.gridColumn = '1';
  lab3.style.gridRow = '1 / span 3';
  lab3.textContent = '3 Players';
  body.appendChild(lab3);

  aliens.forEach((alienName, i) => {
    const row = i + 1;
    const group = i < 3 ? 3 : i + 1; // i=3→4p, i=4→5p, …, i=7→8p

    // Per-row label for 4p..8p
    if (i >= 3) {
      const lab = document.createElement('div');
      lab.className = 'plabel p' + group;
      lab.style.gridColumn = '1';
      lab.style.gridRow = String(row);
      lab.textContent = group + 'p';
      body.appendChild(lab);
    }

    // Alien cell
    const a = findAlien(alienName);
    const cell = document.createElement('div');
    cell.className = 'alien p' + group + (a.missing ? ' missing' : '');
    cell.style.gridColumn = '2';
    cell.style.gridRow = String(row);
    if (a.set) cell.dataset.set = setCode(a.set);

    const nameEl = document.createElement('div');
    nameEl.className = 'alien-name';
    nameEl.textContent = a.name;

    const descEl = document.createElement('div');
    descEl.className = 'alien-desc';
    descEl.textContent = a.desc;

    cell.appendChild(nameEl);
    cell.appendChild(descEl);

    const meta = document.createElement('div');
    meta.className = 'meta';

    if (a.diff) {
      const dot = document.createElement('div');
      dot.className = 'diff ' + diffClass(a.diff);
      dot.title = a.diff;
      meta.appendChild(dot);
    }

    if (a.set) {
      const tag = document.createElement('div');
      tag.className = 'set-tag';
      tag.textContent = setCode(a.set);
      tag.title = a.set;
      meta.appendChild(tag);
    }

    cell.appendChild(meta);
    body.appendChild(cell);
  });

  card.appendChild(body);
  grid.appendChild(card);
}

// Build expansion toggles ------------------------------------------------
const setOrder  = ['Base', 'CI', 'CC', 'CA', 'CS', 'CD', 'CE', 'Promo', 'CO'];
const setNames  = {
  Base:  'Cosmic Encounter (2008)',
  CI:    'Cosmic Incursion (2010)',
  CC:    'Cosmic Conflict (2011)',
  CA:    'Cosmic Alliance (2012)',
  CS:    'Cosmic Storm (2013)',
  CD:    'Cosmic Dominion (2014)',
  CE:    'Cosmic Eons (2016)',
  Promo: 'Promo Aliens',
  CO:    'Cosmic Odyssey (2022)'
};

// Collect the set codes actually used in the rendered cells
const usedSets = new Set(
  Array.from(document.querySelectorAll('.alien[data-set]')).map(el => el.dataset.set)
);

const togglesEl = document.getElementById('toggles');
const ownedSets = new Set(usedSets); // all enabled by default

function refreshMissing() {
  document.querySelectorAll('.alien[data-set]').forEach(el => {
    const owned = ownedSets.has(el.dataset.set);
    el.classList.toggle('missing-set', !owned);
  });
}

setOrder.filter(code => usedSets.has(code)).forEach(code => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'toggle';
  btn.textContent = code;
  btn.title = setNames[code] || code;
  btn.addEventListener('click', () => {
    if (ownedSets.has(code)) {
      ownedSets.delete(code);
      btn.classList.add('off');
    } else {
      ownedSets.add(code);
      btn.classList.remove('off');
    }
    refreshMissing();
  });
  togglesEl.appendChild(btn);
});
</script>
